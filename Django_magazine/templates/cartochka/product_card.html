<div class="product-card">
    <img src="{{ product.image.url }}" alt="{{ product.name }}">
    <button class="favorite-btn">♥</button>
    
    <h3>{{ product.name }}</h3>
    <p>{{ product.size }}</p>
    <div class="price-row">
        <span>{{ product.price }} ₽</span>
        <button class="add-to-cart-btn">+</button>
    </div>
</div>
